<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" role="img" aria-label="litmus CLI demo">
  <title>litmus run examples/</title>
  <style>
    .ln { opacity: 0; animation: appear .01s linear forwards; }
    @keyframes appear { to { opacity: 1; } }
    @keyframes blink { 50% { opacity: 0; } }
    .l0{animation-delay:.2s}.l1{animation-delay:.7s}.l2{animation-delay:1.0s}.l3{animation-delay:1.3s}
    .l4{animation-delay:1.6s}.l5{animation-delay:1.9s}.l6{animation-delay:2.4s}
    .cursor{animation:blink 1s steps(1) infinite;animation-delay:2.6s}
    text{font-size:15px}
    @media (prefers-reduced-motion: reduce){.ln{opacity:1;animation:none}.cursor{animation:none}}
  </style>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect x="8" y="8" width="704" height="344" rx="13" fill="#0b0e14" stroke="#2a3140" filter="url(#sh)" />
  <circle cx="34" cy="34" r="6" fill="#ff5f56" />
  <circle cx="54" cy="34" r="6" fill="#ffbd2e" />
  <circle cx="74" cy="34" r="6" fill="#27c93f" />
  <text x="360" y="39" text-anchor="middle" fill="#6b7480" font-size="13">litmus</text>
  <line x1="8" y1="58" x2="712" y2="58" stroke="#1a1f2b" />
  <g class="ln l0"><text x="30" y="92"><tspan fill="#3fb950">$</tspan><tspan fill="#e8edf5" dx="8">litmus run examples/</tspan></text></g>
  <g class="ln l1"><text x="30" y="128"><tspan fill="#e8edf5" font-weight="700">regression-demo</tspan><tspan dx="10" fill="#d29922">1/3 passed</tspan></text></g>
  <g class="ln l2"><text x="30" y="156"><tspan fill="#3fb950" font-weight="700">PASS</tspan><tspan x="100" fill="#c9d2de">correctly positive</tspan></text></g>
  <g class="ln l3"><text x="30" y="184"><tspan fill="#f85149" font-weight="700">FAIL</tspan><tspan x="100" fill="#c9d2de">mislabeled on purpose</tspan></text></g>
  <g class="ln l4"><text x="100" y="210" fill="#ffb4ae" font-size="14">✗ json-path: expected sentiment "positive", got "negative"</text></g>
  <g class="ln l5"><text x="30" y="246"><tspan fill="#e8edf5" font-weight="700">sentiment-classifier</tspan><tspan dx="10" fill="#3fb950">5/5 passed</tspan></text></g>
  <g class="ln l6"><text x="30" y="306"><tspan fill="#3fb950" font-weight="700">6/8 passed</tspan><tspan fill="#6b7480">, </tspan><tspan fill="#f85149" font-weight="700">2 failed</tspan><tspan class="cursor" dx="8" fill="#3fb950">▋</tspan></text></g>
</svg>
